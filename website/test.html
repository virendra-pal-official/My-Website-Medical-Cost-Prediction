<!DOCTYPE html>
<html>
<head>
<title>Test Prediction</title>
</head>
<body>
<h1>Medical Cost Live Test</h1>
<label>Age: <input type="range" id="testAge" min="0" max="100" value="30"><span id="testAgeVal"></span></label><br>
<label>BMI: <input type="range" id="testBmi" min="0" max="55" value="25" step="0.1"><span id="testBmiVal"></span></label><br>
<label>Children: <input type="range" id="testChildren" min="0" max="5" value="0"><span id="testChildrenVal"></span></label><br>
<h2>Prediction: <span id="testPrediction">₹ Loading...</span></h2>
<script>
const weights = {age:43, bmi:53, children:78};
let prediction = 3000;
document.getElementById('testAge').oninput = updateTest;
document.getElementById('testBmi').oninput = updateTest;
document.getElementById('testChildren').oninput = updateTest;
function updateTest() {
  const age = parseFloat(document.getElementById('testAge').value);
  const bmi = parseFloat(document.getElementById('testBmi').value);
  const children = parseInt(document.getElementById('testChildren').value);
  document.getElementById('testAgeVal').textContent = age;
  document.getElementById('testBmiVal').textContent = bmi.toFixed(1);
  document.getElementById('testChildrenVal').textContent = children;
  prediction = 3000 + age*43 + bmi*53 + children*78;
  document.getElementById('testPrediction').textContent = `₹${Math.round(prediction)}`;
  updateTest();
}
</script>
</body>
</html>
